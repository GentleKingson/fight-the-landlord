name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: gentlekingson/${{ github.event.repository.name }}

jobs:
  release-metadata:
    name: Validate release version
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Parse release version
        id: version
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          version="${TAG#v}"
          # metadata-action omits build metadata from {{version}}, which could
          # overwrite the core release tag.
          release_version_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ "$TAG" != v* || ! "$version" =~ $release_version_regex ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH[-PRERELEASE] without build metadata: $TAG" >&2
            exit 1
          fi

          is_prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease="${version#*-}"
            IFS='.' read -r -a identifiers <<< "$prerelease"
            for identifier in "${identifiers[@]}"; do
              if [[ "$identifier" =~ ^[0-9]+$ && "$identifier" == 0[0-9]* ]]; then
                echo "Numeric prerelease identifiers must not contain leading zeroes: $TAG" >&2
                exit 1
              fi
            done
            is_prerelease=true
          fi

          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

  # 构建客户端二进制文件
  build-client:
    name: Build client binaries
    needs: release-metadata
    runs-on: ubuntu-latest
    env:
      GO_TRIXIE_DIGEST: sha256:4e603da0ea8df4a8ab10cbf0b3061f7823d277e82ea210a47c32a5fafb43cc43
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Go
        if: matrix.goos != 'linux' || matrix.goarch != 'arm64'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux amd64 dependencies
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev

      - name: Build Linux ARM64 in Docker
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        env:
          DEFAULT_SERVER: ${{ vars.DEFAULT_SERVER || 'localhost:1780' }}
          VERSION: ${{ github.ref_name }}
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/src" -w /src \
            -e CGO_ENABLED=1 \
            -e GIT_CEILING_DIRECTORIES=/src \
            "golang:${GO_VERSION}-trixie@${GO_TRIXIE_DIGEST}" \
            sh -c "
              apt-get update && \
              apt-get install -y libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev && \
              go build -buildvcs=false -trimpath -ldflags='-s -w -X main.version=${VERSION} -X main.defaultServer=${DEFAULT_SERVER}' \
                -o fight-the-landlord-linux-arm64 ./cmd/client
            "
          sha256sum fight-the-landlord-linux-arm64 > fight-the-landlord-linux-arm64.sha256

      - name: Build other platforms
        if: matrix.goos != 'linux' || matrix.goarch != 'arm64'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          DEFAULT_SERVER: ${{ vars.DEFAULT_SERVER || 'localhost:1780' }}
        run: |
          # Set output filename
          if [ "$GOOS" = "windows" ]; then
            OUTPUT="fight-the-landlord-${GOOS}-${GOARCH}.exe"
          else
            OUTPUT="fight-the-landlord-${GOOS}-${GOARCH}"
          fi

          # Set CGO for Linux amd64
          if [ "$GOOS" = "linux" ]; then
            export CGO_ENABLED=1
          else
            export CGO_ENABLED=0
          fi

          # Build with optimizations
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.defaultServer=${DEFAULT_SERVER}" \
            -o "$OUTPUT" ./cmd/client

          # Create checksum
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            fight-the-landlord-*
            *.sha256

  # 创建 GitHub Release
  create-release:
    name: Create GitHub release
    needs: [release-metadata, build-client, build-and-push-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.release-metadata.outputs.is_prerelease == 'true' }}

  # 构建并推送 Docker 镜像
  build-and-push-docker:
    name: Build and push Docker image
    needs: [release-metadata, build-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 拉取 DHI Community 基础镜像需登录 dhi.io（个人账号 + PAT 即可）
      - name: Log in to DHI registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: dhi.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}

      - name: Extract DouZero metadata
        id: meta_douzero
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-douzero
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}

      - name: Extract Go Version
        id: go_version
        run: echo "version=$(grep '^go ' go.mod | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build_game
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,compression=zstd
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GO_VERSION=${{ steps.go_version.outputs.version }}

      - name: Sign Docker image
        env:
          DIGEST: ${{ steps.build_game.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              cosign sign --yes "${tag}@${DIGEST}"
            fi
          done <<< "$TAGS"

      - name: Build and push DouZero Docker image
        id: build_douzero
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./douzero
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_douzero.outputs.tags }}
          labels: ${{ steps.meta_douzero.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,compression=zstd
          provenance: mode=max
          sbom: true

      - name: Sign DouZero Docker image
        env:
          DIGEST: ${{ steps.build_douzero.outputs.digest }}
          TAGS: ${{ steps.meta_douzero.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              cosign sign --yes "${tag}@${DIGEST}"
            fi
          done <<< "$TAGS"

      - name: Update Docker Hub description
        if: github.event_name != 'pull_request'
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

  notify:
    name: Release notification
    if: ${{ always() }}
    needs: [build-client, create-release, build-and-push-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions: {}
    steps:
      - name: Notify via Xiaomi Speaker
        uses: palemoky/xiaomi-speaker-action@89e51a3fef090cff990ae9af654d3f29784382a7 # v1.0.3
        with:
          webhook_url: ${{ vars.SPEAKER_WEBHOOK_URL }}
          api_secret: ${{ secrets.SPEAKER_API_SECRET }}
          cf_client_id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf_client_secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          job_status: ${{ (needs.build-client.result == 'success' && needs.create-release.result == 'success' && needs.build-and-push-docker.result == 'success') && 'success' || 'failure' }}
          success_message: "Ship it! ${{ github.event.repository.name }} is live."
          failure_message: "Mayday! Mayday! ${{ github.event.repository.name }} is broken, I repeat, ${{ github.event.repository.name }} is broken!"
          max_retries: 3
          timeout: 5000

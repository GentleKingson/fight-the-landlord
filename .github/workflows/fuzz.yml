name: Nightly fuzz

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: Per-target Go fuzz duration
        required: true
        default: 1m
        type: choice
        options:
          - 1m
          - 3m
          - 5m

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Go fuzz and properties
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify immutable Actions references
        run: ./scripts/check-actions-pinning.sh

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run deterministic core properties
        run: >-
          go test -tags=ci -count=1
          ./internal/protocol/...
          ./internal/game/rule/...
          ./internal/server/session/...
          ./internal/config
          ./internal/server

      - name: Run extended fuzz targets
        env:
          FUZZ_TIME: ${{ github.event_name == 'workflow_dispatch' && inputs.fuzz_time || '1m' }}
          FUZZ_TIMEOUT: 80m
          FUZZ_PARALLEL: "1"
        run: |
          set -o pipefail
          ./scripts/run-fuzz-tests.sh 2>&1 | tee fuzz.log

      - name: Upload fuzz log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-fuzz-log
          path: fuzz.log
          if-no-files-found: warn

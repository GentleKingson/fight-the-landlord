name: Public Test Game Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  workflow_dispatch:
    inputs:
      preset:
        description: Complete-game workload preset
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - public-test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  complete-game-smoke:
    name: Complete-game public test smoke
    runs-on: ubuntu-latest
    timeout-minutes: 80
    env:
      SERVER_ENV: development
      SERVER_PORT: "1785"
      SERVER_MAX_CONNECTIONS: "100"
      SERVER_MIN_CLIENT_VERSION: ""
      REDIS_ADDR: 127.0.0.1:6379
      BOT_ENABLED: "false"
      DOUZERO_ENABLED: "false"
      GAME_BID_TIMEOUT: "5"
      GAME_TURN_TIMEOUT: "5"
      GAME_ROOM_CLEANUP_DELAY: "0"
      GAME_OFFLINE_WAIT_TIMEOUT: "5"
      GAME_SHUTDOWN_TIMEOUT: "1"
      GAME_SHUTDOWN_CHECK_INTERVAL: "1"
      SECURITY_ALLOWED_ORIGINS: "*"
      SECURITY_RATE_LIMIT_PER_SECOND: "1000"
      SECURITY_RATE_LIMIT_PER_MINUTE: "100000"
      SECURITY_MESSAGE_LIMIT_PER_SECOND: "1000"
      SECURITY_CHAT_LIMIT_PER_SECOND: "1000"
      SECURITY_CHAT_LIMIT_PER_MINUTE: "100000"
      OBSERVABILITY_METRICS_ENABLED: "true"
      OBSERVABILITY_LOG_FORMAT: json
      PUBLIC_TEST_URL: ws://127.0.0.1:1785/ws
      PUBLIC_TEST_METRICS_URL: http://127.0.0.1:1785/metrics
      PUBLIC_TEST_OUTPUT_DIR: artifacts/public-test
      PUBLIC_TEST_COOLDOWN: 3s
      PUBLIC_TEST_SEED: "1"

    services:
      redis:
        image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test complete-game harness
        run: go test -race ./tests/publictest -count=1

      - name: Build and start isolated server
        id: start_server
        run: |
          set -euo pipefail
          mkdir -p artifacts/public-test
          go build -o "$RUNNER_TEMP/fight-landlord-public-test-server" ./cmd/server
          "$RUNNER_TEMP/fight-landlord-public-test-server" > artifacts/public-test/server.log 2>&1 &
          server_pid=$!
          printf '%s\n' "$server_pid" > "$RUNNER_TEMP/fight-landlord-public-test-server.pid"
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:1785/readyz >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat artifacts/public-test/server.log
              exit 1
            fi
            sleep 1
          done
          cat artifacts/public-test/server.log
          exit 1

      - name: Run complete-game workload
        env:
          SELECTED_PRESET: ${{ inputs.preset || 'smoke' }}
          EVENT_NAME: ${{ github.event_name }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          selected_preset="$SELECTED_PRESET"
          if [ "$EVENT_NAME" = "pull_request" ] && [ "$PR_DRAFT" != "true" ]; then
            selected_preset=public-test
          fi
          case "$selected_preset" in
            smoke)
              args=(smoke --duration 30s --players 6 --disconnect-rate 0.10 --douzero false)
              ;;
            public-test)
              args=(public-test --players 18 --disconnect-rate 0.02 --douzero false)
              ;;
            *)
              echo "unsupported public-test preset: $selected_preset" >&2
              exit 1
              ;;
          esac
          ./scripts/run-public-test-smoke.sh "${args[@]}"

      - name: Verify server survived
        if: always() && steps.start_server.outcome == 'success'
        run: |
          set -euo pipefail
          server_pid=$(cat "$RUNNER_TEMP/fight-landlord-public-test-server.pid")
          kill -0 "$server_pid"
          curl --fail http://127.0.0.1:1785/livez
          curl --fail http://127.0.0.1:1785/readyz
          curl --fail http://127.0.0.1:1785/metrics > artifacts/public-test/final-metrics.txt

      - name: Stop isolated server
        if: always()
        run: |
          set -euo pipefail
          pid_file="$RUNNER_TEMP/fight-landlord-public-test-server.pid"
          if [ ! -f "$pid_file" ]; then
            exit 0
          fi
          server_pid=$(cat "$pid_file")
          if kill -0 "$server_pid" 2>/dev/null; then
            kill -TERM "$server_pid"
            for _ in $(seq 1 20); do
              if ! kill -0 "$server_pid" 2>/dev/null; then
                exit 0
              fi
              sleep 1
            done
            kill -KILL "$server_pid"
          fi

      - name: Upload public test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-test-complete-game-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/public-test/
          if-no-files-found: warn
          retention-days: 14

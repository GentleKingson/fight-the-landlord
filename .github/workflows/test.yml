name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify release identity
        run: ./scripts/check-release-identity.sh

      - name: Verify immutable Actions references
        run: ./scripts/check-actions-pinning.sh

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # 版本须与 .pre-commit-config.yaml 保持一致，避免本地与 CI 结果不一致
          version: v2.11.1
          args: --build-tags=ci

      - name: Check gofmt
        run: |
          unformatted="$(git ls-files '*.go' | xargs gofmt -l)"
          test -z "$unformatted" || { printf 'Run gofmt on:\n%s\n' "$unformatted"; exit 1; }

      - name: Set up protoc
        env:
          PROTOC_VERSION: "3.13.0"
          PROTOC_SHA256: 4a3b26d1ebb9c1d23e933694a6669295f6a39ddc64c3db2adf671f0a6026f82e
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/protoc.zip"
          install_dir="$RUNNER_TEMP/protoc"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" \
            --output "$archive"
          printf '%s  %s\n' "$PROTOC_SHA256" "$archive" | sha256sum --check -
          unzip -q "$archive" -d "$install_dir"
          echo "$install_dir/bin" >> "$GITHUB_PATH"
          "$install_dir/bin/protoc" --version

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11

      - name: Check generated Go protocol
        run: |
          protoc --experimental_allow_proto3_optional --proto_path=. --go_out=. \
            --go_opt=module=github.com/palemoky/fight-the-landlord \
            internal/protocol/proto/*.proto
          (cd internal/protocol/convert/msgtype && go run gen.go)
          gofmt -w internal/protocol/convert/msgtype/mapping.go
          git diff --exit-code -- internal/protocol/pb internal/protocol/convert/msgtype

      - name: Run tests
        # Use ci tag to skip sound tests/deps
        run: |
          set -o pipefail
          go test -tags=ci -race -p 4 -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | tee go-race.log

      - name: Upload Go race and coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-race-and-coverage
          path: |
            go-race.log
            coverage.out
          if-no-files-found: warn

      - name: Save Go cache
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: github.ref == 'refs/heads/main'
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  web:
    name: Web checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check generated Web protocol
        run: npm run proto:check

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Benchmark full-hand rule response enumeration
        run: npm run bench:rules

      - name: Build production client
        env:
          VITE_APP_VERSION: ci
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run mock Playwright accessibility and screenshot tests
        run: npm run test:e2e

  load-smoke:
    name: Short WebSocket load smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test load generator
        run: go test ./tests/load -count=1

      - name: Build and start smoke server
        id: start_load_server
        env:
          SERVER_ENV: development
          SERVER_PORT: "1783"
          SERVER_MAX_CONNECTIONS: "100"
          SERVER_MIN_CLIENT_VERSION: ""
          REDIS_ADDR: 127.0.0.1:6379
          BOT_ENABLED: "false"
          DOUZERO_ENABLED: "false"
          SECURITY_ALLOWED_ORIGINS: "*"
          SECURITY_RATE_LIMIT_PER_SECOND: "100"
          SECURITY_RATE_LIMIT_PER_MINUTE: "1000"
          SECURITY_MESSAGE_LIMIT_PER_SECOND: "100"
          OBSERVABILITY_METRICS_ENABLED: "true"
          OBSERVABILITY_LOG_FORMAT: json
          GAME_SHUTDOWN_TIMEOUT: "1"
          GAME_SHUTDOWN_CHECK_INTERVAL: "1"
        run: |
          set -euo pipefail
          mkdir -p artifacts/load-smoke
          go build -o "$RUNNER_TEMP/fight-landlord-load-server" ./cmd/server
          "$RUNNER_TEMP/fight-landlord-load-server" > artifacts/load-smoke/server.log 2>&1 &
          server_pid=$!
          printf '%s\n' "$server_pid" > "$RUNNER_TEMP/fight-landlord-load-server.pid"
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:1783/readyz >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat artifacts/load-smoke/server.log
              exit 1
            fi
            sleep 1
          done
          cat artifacts/load-smoke/server.log
          exit 1

      - name: Run short load smoke
        env:
          LOAD_TEST_URL: ws://127.0.0.1:1783/ws
          LOAD_TEST_METRICS_URL: http://127.0.0.1:1783/metrics
          LOAD_TEST_CONNECTIONS: "10"
          LOAD_TEST_CONNECT_CONCURRENCY: "5"
          LOAD_TEST_DURATION: 5s
          LOAD_TEST_COOLDOWN: 2s
          LOAD_TEST_RECONNECTS: "3"
          LOAD_TEST_ROOM_OPERATIONS: "3"
          LOAD_TEST_MATCH_OPERATIONS: "2"
          LOAD_TEST_MATCH_TIMEOUTS: "0"
          LOAD_TEST_MAX_REDIS_ERRORS: "0"
          LOAD_TEST_MAX_FINAL_CONNECTIONS_DELTA: "0"
          LOAD_TEST_MAX_FINAL_GOROUTINES_DELTA: "10"
          LOAD_TEST_JSON_OUT: artifacts/load-smoke/load-test.json
          LOAD_TEST_MARKDOWN_OUT: artifacts/load-smoke/load-test.md
        run: ./scripts/run-load-test.sh

      - name: Verify smoke server survived
        if: always() && steps.start_load_server.outcome == 'success'
        run: |
          set -euo pipefail
          server_pid=$(cat "$RUNNER_TEMP/fight-landlord-load-server.pid")
          kill -0 "$server_pid"
          curl --fail http://127.0.0.1:1783/livez
          curl --fail http://127.0.0.1:1783/metrics > artifacts/load-smoke/final-metrics.txt

      - name: Stop smoke server
        if: always()
        run: |
          set -euo pipefail
          pid_file="$RUNNER_TEMP/fight-landlord-load-server.pid"
          if [ ! -f "$pid_file" ]; then
            exit 0
          fi
          server_pid=$(cat "$pid_file")
          if kill -0 "$server_pid" 2>/dev/null; then
            kill -TERM "$server_pid"
            for _ in $(seq 1 20); do
              if ! kill -0 "$server_pid" 2>/dev/null; then
                exit 0
              fi
              sleep 1
            done
            kill -KILL "$server_pid"
          fi

      - name: Upload load smoke evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: websocket-load-smoke
          path: artifacts/load-smoke/
          if-no-files-found: warn

  production-e2e:
    name: Shipped-image production E2E
    needs: [go, web]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      COMPOSE_PROJECT_NAME: fight-the-landlord-production-e2e
      GAME_IMAGE: fight-the-landlord
      IMAGE_TAG: ci
      SERVER_ENV: production
      SERVER_PORT: "1782"
      REDIS_ADDR: redis:6379
      BOT_ENABLED: "false"
      DOUZERO_ENABLED: "false"
      GAME_BID_TIMEOUT: "5"
      GAME_TURN_TIMEOUT: "5"
      GAME_ROOM_CLEANUP_DELAY: "0"
      GAME_OFFLINE_WAIT_TIMEOUT: "5"
      GAME_SHUTDOWN_TIMEOUT: "1"
      GAME_SHUTDOWN_CHECK_INTERVAL: "1"
      SERVER_MIN_CLIENT_VERSION: ""
      SECURITY_ALLOWED_ORIGINS: https://127.0.0.1:1783
      SECURITY_TRUSTED_PROXY_CIDRS: 172.16.0.0/12
      E2E_BASE_URL: https://127.0.0.1:1783
      E2E_TLS_PROXY_TARGET: http://127.0.0.1:1782
      E2E_TLS_PROXY_PORT: "1783"
      E2E_EXPECTED_VERSION: ci
      E2E_COMPOSE_PROJECT_NAME: fight-the-landlord-production-e2e
      E2E_COMPOSE_FILE: ${{ github.workspace }}/docker-compose.yml
      E2E_REDIS_SERVICE: redis
      E2E_SERVER_SERVICE: poker-server

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Verify Compose security invariants
        run: ./scripts/check-compose-security.sh

      - name: Prepare production environment
        run: |
          mkdir -p artifacts
          echo "REDIS_PASSWORD=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Build production image
        run: |
          docker build \
            --build-arg VERSION=ci \
            --tag fight-the-landlord:ci \
            .

      - name: Generate production image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: fight-the-landlord:ci
          format: spdx-json
          output-file: artifacts/production-image.spdx.json
          artifact-name: production-image-sbom

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example config --quiet

      - name: Start final image with Compose
        run: |
          set -euo pipefail
          docker compose --env-file .env.example up -d --wait redis poker-server
          redis_id="$(docker compose --env-file .env.example ps -q redis)"
          test -n "$redis_id"
          test "$(docker exec "$redis_id" awk '/^Uid:/{print $2}' /proc/1/status)" != 0

          if docker compose --env-file .env.example ps --services --status running | grep -qx douzero; then
            echo "DouZero must remain disabled without the optional profile"
            exit 1
          fi

          server_id="$(docker compose --env-file .env.example ps -q poker-server)"
          test -n "$server_id"
          test "$(docker inspect --format='{{.State.Health.Status}}' "$server_id")" = healthy

      - name: Install Web dependencies
        working-directory: web
        run: npm ci

      - name: Install Chromium, Firefox, and WebKit
        working-directory: web
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run production image browser and fault flows
        working-directory: web
        env:
          CI: "true"
        run: npm run test:e2e:production

      - name: Capture Compose diagnostics
        if: always()
        run: |
          mkdir -p artifacts
          docker compose --env-file .env.example ps --all > artifacts/compose-ps.txt 2>&1 || true
          docker compose --env-file .env.example logs --no-color --timestamps > artifacts/compose.log 2>&1 || true
          docker inspect fight-the-landlord:ci > artifacts/production-image-inspect.json 2>&1 || true

      - name: Stop production stack
        if: always()
        run: docker compose --env-file .env.example down --timeout 90 --volumes --remove-orphans

      - name: Upload Playwright evidence and Compose logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-e2e-evidence
          path: |
            web/test-results/
            artifacts/compose-ps.txt
            artifacts/compose.log
            artifacts/production-image-inspect.json
          if-no-files-found: warn
